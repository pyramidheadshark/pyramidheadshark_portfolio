name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Разрешения, необходимые для публикации в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны: отменяем предыдущий в пользу свежего
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Пересобираем index.html из src/raw-bundle.html, чтобы артефакт в репо
      # никогда не расходился с источником и конфигом мета-тегов.
      # DOMAIN берётся из переменной окружения репозитория (Settings → Variables).
      # Если она не задана — origin останется github.io, что тоже валидно.
      - name: Build bundle
        env:
          DOMAIN: ${{ vars.PAGES_DOMAIN }}
        run: python3 scripts/build_bundle.py

      # Собираем чистый каталог публикации: только то, что нужно браузеру.
      # Источник (src/) и скрипты в продакшен не попадают.
      - name: Assemble _site
        run: |
          mkdir -p _site
          cp index.html og-image.png _site/
          [ -f CNAME ] && cp CNAME _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
