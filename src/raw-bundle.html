document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ech }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Challenge -->\n        <div>\n          <h4 style=\"font-size:11px;font-weight:500;color:#9CA3AF;text-transform:uppercase;letter-spacing:1.2px;font-family:'JetBrains Mono',monospace;margin-bottom:12px;\">Что было сложно<\u002Fh4>\n          <p style=\"font-size:13px;color:#374151;line-height:1.7;border-left:2px solid #B5D4F4;padding-left:14px;\">{{ projDifficulty }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { activeProjectId: null, drawerOpen: false, networkMode: 'hero' };\n  bgRef = React.createRef();\n  nodes = []; shockwaves = [];\n  mouse = { x: -9999, y: -9999 };\n  bgAnimId = null;\n  cardAnimIds = {};\n  isTabVisible = true;\n  networkModeRef = 'hero';\n  bgT = 0;\n  lastBgTime = 0;\n\n  projectsData = {\n    defectoscopy: {\n      title: 'AI-Дефектоскопия зданий',\n      tag: 'TechCon · 2026 · Руководитель AI-отдела',\n      fullDesc: 'Флагманская CV-система для автоматической дефектоскопии зданий в ходе инженерного обследования. Иерархическая архитектура: сначала определяется тип поверхности (12 типов: фасад, кровля, подвал и другие), затем мастер-домен, затем конкретный дефект из 300+ классов. Это исключает ложные срабатывания между несовместимыми поверхностями.',\n      architecture: 'Фото → SAHI tiles → DINOv3 ViT-L/16 (frozen) → HierarchicalExpert → Domain Masking → Top-2 Mean → Результат',\n      metrics: [{v:'86%',l:'точность'},{v:'300+',l:'классов дефектов'},{v:'12',l:'типов поверхностей'},{v:'1 000',l:'фото в валидации'}],\n      stack: ['PyTorch','DINOv3 ViT-L/16','SAHI','FastAPI','Redis Streams','Yandex Cloud','Prometheus'],\n      difficulty: 'Стандартный плоский классификатор не работает — дефект на кровле и дефект на фасаде имеют разные признаки. Пришлось строить трёхголовую иерархическую модель, где каждая следующая голова использует вероятности предыдущей и применяет domain masking.',\n    },\n    documents: {\n      title: 'Оцифровка технических паспортов',\n      tag: 'TechCon · 2026 · Document AI',\n      fullDesc: 'Сервис автоматического извлечения данных из PDF технических паспортов зданий. Ключевая сложность: паспорта содержат таблицы, чертежи, рукописные пометки и разное качество сканов. Решение: мультимодальная LLM с явной JSON Schema, правилами работы с шумом и приоритетами источников. 40+ извлекаемых полей.',\n      architecture: 'PDF/img → FastAPI → PostgreSQL task → Celery worker → LLM (Qwen/OpenRouter) → JSON repair → Pydantic validation → Результат оператору',\n      metrics: [{v:'15 сек',l:'время обработки'},{v:'97%',l:'без ручной правки'},{v:'1 000+',l:'документов'},{v:'40+',l:'полей'}],\n      stack: ['FastAPI','Celery','PostgreSQL','Qwen via OpenRouter','Pydantic','PyMuPDF','OpenCV','Prometheus'],\n      difficulty: 'Паспорта построены на нестандартных шаблонах с рукописными пометками и разным качеством сканов. Пришлось строить систему приоритетов источников (таблица > текст > чертёж) и SHA-256 кеш для повторных документов.',\n    },\n    stt: {\n      title: 'Speech-to-Text для инженерных записей',\n      tag: 'TechCon · 2026 · ASR',\n      fullDesc: 'Сервис транскрибации голосовых описаний дефектов инженерами на выезде. Длинные записи разбиваются по речевым сегментам (Silero VAD), а не по таймеру — критично для инженерных монологов, где одно предложение может длиться 40 секунд. WER ~8% на уровне GigaAM v3 baseline.',\n      architecture: 'Audio URL → FFmpeg 16kHz mono → Silero VAD → GigaAM v3 chunks → Join → Транскрипция',\n      metrics: [{v:'~8%',l:'WER (GigaAM baseline)'},{v:'~0',l:'маргинальная стоимость'},{v:'40 сек',l:'на 10 мин аудио'},{v:'co-located',l:'GPU с дефектоскопией'}],\n      stack: ['GigaAM v3','Silero VAD','FastAPI','Redis Streams (owner-fencing)','PyTorch','httpx/HMAC'],\n      difficulty: 'STT работает на том же GPU-кластере что и дефектоскопия. Ещё один inference-инстанс не помещался, а STT — вошла идеально. Реализован owner-fencing для защиты GPU-воркеров от конкурентного потребления.',\n    },\n    infra: {\n      title: 'ML-инфраструктура TechCon',\n      tag: 'TechCon · 2026 · MLOps',\n      fullDesc: 'Операционный слой AI-экосистемы TechCon. Ключевая задача: ML-сервисы с дорогими GPU нельзя держать включёнными всегда. Решения: CPU-first/GPU-last autoscaling, budget gate (жёсткий потолок стоимости), T4 autoscaling через Redis queue depth, cross-repo агентный governance hub.',\n      architecture: 'Redis Streams → GPU task queue → T4 autoscaler → ML worker → VictoriaMetrics → Grafana + Loki + Alertmanager',\n      metrics: [{v:'T4',l:'autoscaling'},{v:'CPU-first',l:'GPU-last стратегия'},{v:'full',l:'observability stack'},{v:'0',l:'неотслеживаемых изменений'}],\n      stack: ['VictoriaMetrics','Grafana','Loki','Vector','Alertmanager','Gatus','Yandex Cloud','Redis Streams','Python/systemd'],\n      difficulty: 'Anti-hallucination protocol для агентов: утверждения о состоянии задачи требуют чтения файла, а не предположений. Machine-readable truth через JSON registries. Budget gate предотвращает случайный перерасход GPU.',\n    },\n    'fkr-bot': {\n      title: 'Бот консультации жителей ФКР',\n      tag: 'Сбер · 2025 · Клиентский департамент',\n      fullDesc: 'Диалоговый агент для консультации жителей по вопросам фонда капитального ремонта. Знает данные по домам, начислениям, адресам, работам и контактам конкретного региона. На старте оцифровали десятки тысяч бумажных обращений граждан, перевели в электронные сценарии.',\n      architecture: 'User → n8n workflow → 2-уровневая маршрутизация → GigaChat/Gemini → Региональная БД → Ответ',\n      metrics: [{v:'1 000+',l:'уникальных пользователей'},{v:'80%+',l:'положительных оценок'},{v:'2+',l:'региона (Калужская, ХМАО)'},{v:'GenAI',l:'Native аккредитация'}],\n      stack: ['n8n','GigaChat','OpenRouter/Gemini','PostgreSQL','Qdrant'],\n      difficulty: 'Платформа n8n — требование партнёра без штата AI-разработчиков. Детерминированная двухуровневая маршрутизация, региональная конфигурация как отдельная граница, benchmark-контур отделён от пользовательского workflow.',\n    },\n    assistant: {\n      title: 'Ассистент оператора Service Desk',\n      tag: 'Сбер · 2025 · RAG',\n      fullDesc: 'Ассистент для операторов Service Desk в Naumen: ищет ответ в базе знаний (мультимедиа, презентации, неявные связи), формирует черновик, оператор акцептует или отклоняет. В процессе разработки отозвали доступ к западным моделям — пришлось перестроить за короткое время.',\n      architecture: 'HTTP → Naumen context → PII redaction (3 уровня) → classify → hybrid retrieval → generate → deanonymize → answer',\n      metrics: [{v:'3',l:'уровня PII-защиты'},{v:'BM25',l:'+ pgvector hybrid'},{v:'передан',l:'заказчику'},{v:'HTTP 200',l:'≠ успех (эскалация видна)'}],\n      stack: ['FastAPI','LangGraph','ChromaDB','BM25+pgvector','Natasha','GLiNER','Cloud.ru/OpenRouter'],\n      difficulty: 'Трёхуровневая PII-система: (1) regex/маски, (2) Natasha/GLiNER, (3) микрообученная модель под параметры клиента. HTTP 200 ≠ успех — бизнес-эскалация не маскируется под успешный ответ.',\n    },\n    negotiations: {\n      title: 'Верификация качества переговоров',\n      tag: 'Сбер · 2025 · LLM Pipeline',\n      fullDesc: 'Автоматическая оценка переговорных встреч клиентских менеджеров по методике стратегического диалога. Принимает пакет документов (транскрипция, резюме, предложения, опросник), выдаёт баллы и разбор ошибок. Победитель и призёры совпали с решением жюри.',\n      architecture: 'Пакет документов → P1 Scoring (Claude Sonnet) → Enrichment (Gemini Flash) → Попарное сравнение → HTML/DOCX отчёт',\n      metrics: [{v:'50+',l:'реальных встреч'},{v:'2',l:'уровня анализа'},{v:'точнее',l:'чем судьи-эксперты'},{v:'cache',l:'по hash документов'}],\n      stack: ['python-docx','Claude Sonnet (P1)','Gemini Flash (enrichment)','Pydantic','Jinja2'],\n      difficulty: 'Судьи оценивали последовательно — ранние участники получали завышенные оценки. Система рассматривает всех в параллели с попарным сравнением, устраняя sequential bias.',\n    },\n    budgets: {\n      title: 'Анализ бюджетной устойчивости регионов',\n      tag: 'Сбер · 2025 · Стратегическая аналитика',\n      fullDesc: 'Воспроизводимый расчётный контур оценки бюджетной устойчивости регионов. Собственная методология с весами по блокам доходов, расходов, долга и отраслевой структуры. Интегрирован в BI «Навигатор» Сбера. Значительно повлиял на восприятие стратегии госкредитования.',\n      architecture: 'Минфин/ФНС данные → D2 anomaly guard → Детерминированный расчёт → LLM enrichment layer → Plotly dashboard → BI Навигатор',\n      metrics: [{v:'84',l:'региона РФ'},{v:'5',l:'стресс-сценариев'},{v:'release',l:'1.0.0'},{v:'BI',l:'Навигатор Сбера'}],\n      stack: ['pandas','FastAPI','Plotly','Jinja2','OpenRouter (исследовательский слой)'],\n      difficulty: 'Нестабильные государственные источники (Минфин, ФНС) с регулярными форматными изменениями. D2 anomaly guard, mining-data correction, red flags для аномальных данных. LLM — только слой обогащения поверх детерминированного расчёта.',\n    },\n    analytics: {\n      title: 'Конкурентная аналитика субфедерального кредитования',\n      tag: 'Сбер · 2025 · Стратегическая аналитика',\n      fullDesc: 'Dashboard для высшего руководства территориального банка: позиция Сбера на рынке субфедерального кредитования, динамика конкурентов, пропущенные аукционы, регионы риска. Эту аналитику раньше не мог предоставить никто — данные ЦБ есть у всех, но систематической обработки не было.',\n      architecture: 'CBR Form 101 (dbf) → парсинг → расчёт HHI/долей → Plotly dashboard → Excel-отчёт для руководства',\n      metrics: [{v:'824,5',l:'млрд руб. рынок Q4\\'25'},{v:'45%',l:'доля Сбера'},{v:'884',l:'пропущенных аукциона'},{v:'0.26',l:'HHI индекс'}],\n      stack: ['dbfread','openpyxl','Plotly/ECharts/Bootstrap','pandas'],\n      difficulty: 'Данные ЦБ Form 101 — dbf-формат без документации. Пришлось реверсировать структуру, нормализовать коды банков и связать с данными об аукционах. ~470 млрд руб. пропущенного объёма — никто до этого не считал.',\n    },\n    rag: {\n      title: 'RAG-агент консультации БРИС ЖКХ',\n      tag: 'Сбер · 2025 · Production RAG',\n      fullDesc: 'Production-ready RAG-сервис для консультаций по базе знаний БРИС ЖКХ. Архитектурно наиболее зрелый из ЖКХ-проектов. Явный архитектурный контракт с Java-бэкендом: Python владеет retrieval/guardrails/generation, Java — сессией и историей.',\n      architecture: 'Query → BM25 + pgvector → RRF → child-to-parent expansion → cross-encoder rerank → LLM generate → citation guardrails → ответ',\n      metrics: [{v:'hybrid',l:'retrieval (BM25+pgvec)'},{v:'RRF',l:'+ cross-encoder rerank'},{v:'citation',l:'guardrails в графе'},{v:'Java',l:'архитектурный контракт'}],\n      stack: ['FastAPI','LangGraph + Redis checkpoint','PostgreSQL + pgvector','GigaChat + OpenRouter','Langfuse'],\n      difficulty: 'HTTP 200 ≠ успех: off_topic / no_results / no_citation не маскируются под успешный ответ. Citation guardrails встроены в граф, а не постфактум. Явные границы ответственности Python/Java.',\n    },\n  };\n\n  componentDidMount() {\n    this.initBackground();\n    this.initCardViz();\n    this.initScrollObservers();\n    window.addEventListener('mousemove', this.onMouse);\n    document.addEventListener('visibilitychange', this.onVisibility);\n    document.addEventListener('click', this.onDocClick);\n  }\n\n  componentWillUnmount() {\n    if (this.bgAnimId) cancelAnimationFrame(this.bgAnimId);\n    Object.values(this.cardAnimIds).forEach(id => cancelAnimationFrame(id));\n    window.removeEventListener('mousemove', this.onMouse);\n    document.removeEventListener('visibilitychange', this.onVisibility);\n    document.removeEventListener('click', this.onDocClick);\n  }\n\n  onMouse = (e) => { this.mouse = { x: e.clientX, y: e.clientY }; };\n  onVisibility = () => { this.isTabVisible = !document.hidden; };\n  onDocClick = (e) => {\n    if (e.target.closest('a, button, input, textarea')) return;\n    this.shockwaves.push({ x: e.clientX, y: e.clientY + (window.scrollY || 0), r: 0, age: 0 });\n  };\n\n  initBackground() {\n    const canvas = this.bgRef.current;\n    if (!canvas) return;\n    const spawnNodes = () => {\n      const W = canvas.width;\n      const fullH = Math.max(document.documentElement.scrollHeight, window.innerHeight * 4);\n      this.fullPageH = fullH;\n      this.nodes = Array.from({ length: 380 }, (_, i) => ({\n        x: Math.random() * W, y: Math.random() * fullH,\n        vx: (Math.random() - 0.5) * 0.45, vy: (Math.random() - 0.5) * 0.45,\n        r: 3.5 + Math.random() * 3.0, seed: i,\n        angle: Math.random() * Math.PI * 2,\n      }));\n    };\n    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; spawnNodes(); };\n    resize();\n    window.addEventListener('resize', resize);\n    setTimeout(() => { this.fullPageH = Math.max(document.documentElement.scrollHeight, window.innerHeight * 4); spawnNodes(); }, 900);\n    const loop = (ts) => {\n      if (this.isTabVisible) {\n        if (ts - this.lastBgTime > 14) {\n          this.drawBackground(canvas);\n          this.lastBgTime = ts;\n          this.bgT += 0.016;\n        }\n      }\n      this.bgAnimId = requestAnimationFrame(loop);\n    };\n    this.bgAnimId = requestAnimationFrame(loop);\n  }\n\n  drawBackground(canvas) {\n    const ctx = canvas.getContext('2d');\n    const W = canvas.width, H = canvas.height;\n    const scrollY = window.scrollY || 0;\n    const fullH = this.fullPageH || H * 4;\n    ctx.clearRect(0, 0, W, H);\n    const nodes = this.nodes;\n    const mouse = this.mouse;\n\n    // Age & expand shockwaves (page-space coords)\n    this.shockwaves = this.shockwaves.filter(sw => sw.age < 1);\n    this.shockwaves.forEach(sw => { sw.r += 9; sw.age += 0.017; });\n\n    // Physics pass — page-space coordinates, free drift always\n    nodes.forEach((n, i) => {\n      n.x += n.vx; n.y += n.vy;\n      if (n.x < -30) n.vx += 0.07; else if (n.x > W + 30) n.vx -= 0.07;\n      if (n.y < -30) n.vy += 0.07; else if (n.y > fullH + 30) n.vy -= 0.07;\n\n      // Mouse REPULSION — convert node page-Y to viewport for comparison\n      const vY = n.y - scrollY;\n      const mdx = n.x - mouse.x, mdy = vY - mouse.y;\n      const md = Math.sqrt(mdx * mdx + mdy * mdy);\n      if (md < 150 && md > 0) {\n        const rf = (150 - md) / 150;\n        n.vx += (mdx / md) * rf * rf * 1.3;\n        n.vy += (mdy / md) * rf * rf * 1.3;\n      }\n\n      // Shockwave ring impulse (page-space)\n      this.shockwaves.forEach(sw => {\n        const sdx = n.x - sw.x, sdy = n.y - sw.y;\n        const sd = Math.sqrt(sdx * sdx + sdy * sdy);\n        if (sd > 0) {\n          const diff = Math.abs(sd - sw.r);\n          if (diff < 70) {\n            const f = (1 - diff / 70) * (1 - sw.age) * 4.5;\n            n.vx += (sdx / sd) * f;\n            n.vy += (sdy / sd) * f;\n          }\n        }\n      });\n\n      n.vx *= 0.979; n.vy *= 0.979;\n      const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);\n      if (spd > 2.8) { n.vx *= 2.8 / spd; n.vy *= 2.8 / spd; }\n      if (spd < 0.22) { n.vx += (Math.random() - 0.5) * 0.09; n.vy += (Math.random() - 0.5) * 0.09; }\n\n      // Smooth angle — акула смотрит куда плывёт\n      if (spd > 0.04) {\n        const targetAngle = Math.atan2(n.vy, n.vx);\n        let diff = targetAngle - (n.angle || 0);\n        while (diff > Math.PI) diff -= 2 * Math.PI;\n        while (diff < -Math.PI) diff += 2 * Math.PI;\n        n.angle = (n.angle || 0) + diff * 0.035;\n      }\n    });\n\n    // Node-to-node repulsion — active window only for performance\n    const winTop = scrollY - H, winBot = scrollY + H * 2;\n    for (let i = 0; i < nodes.length; i++) {\n      if (nodes[i].y < winTop || nodes[ n\n      // ── ПРАВАЯ ЧАСТЬ: трендовый line chart (5 стресс-сценариев + базовый) ──\n      const rL=splitX+9, rR=w-5, rT=9, rB=h-15;\n      const rW=rR-rL, rH=rB-rT;\n\n      // 6 кварталов, базовый + 2 сценария\n      const base =   [0.60,0.64,0.68,0.71,0.74,0.77];\n      const stress1= [0.60,0.59,0.57,0.55,0.54,0.53]; // шок доходов\n      const stress2= [0.60,0.63,0.65,0.64,0.62,0.61]; // долговая нагрузка\n      const N = base.length;\n      const minV=0.44, maxV=0.82, span=maxV-minV;\n      const qx = i => rL + (i/(N-1))*rW;\n      const qy = v => rT + rH*(1-(v-minV)/span);\n\n      // анимация трассировки: цикл 4 сек\n      const lp = t % 4.5;\n      const frac = Math.min(1, lp * 0.7);\n      const visEnd = frac * (N-1);\n\n      // рисуем серию\n      const drawSeries = (pts, color, alpha, dashed) => {\n        ctx.beginPath();\n        if (dashed) ctx.setLineDash([2,2]);\n        for (let i=0; i<N; i++) {\n          const prog = Math.min(1, Math.max(0, visEnd-i+1));\n          if (prog <= 0) break;\n          const x = qx(i), y = qy(pts[i]);\n          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);\n        }\n        ctx.strokeStyle = color; ctx.lineWidth = dashed ? 0.8 : 1.5;\n        ctx.globalAlpha = alpha; ctx.stroke();\n        ctx.setLineDash([]); ctx.globalAlpha = 1;\n      };\n\n      // area под базовым\n      const visN = Math.ceil(visEnd)+1;\n      ctx.beginPath();\n      ctx.moveTo(qx(0), rB);\n      for (let i=0; i<Math.min(visN,N); i++) ctx.lineTo(qx(i), qy(base[i]));\n      ctx.lineTo(qx(Math.min(visEnd,N-1)), rB);\n      ctx.closePath();\n      const ag = ctx.createLinearGradient(rL, rT, rL, rB);\n      ag.addColorStop(0,'rgba(24,95,165,0.20)'); ag.addColorStop(1,'rgba(24,95,165,0.02)');\n      ctx.fillStyle=ag; ctx.fill();\n\n      drawSeries(stress1,'rgba(218,58,28,0.75)', 0.9, true);\n      drawSeries(stress2,'rgba(133,79,11,0.65)', 0.9, true);\n      drawSeries(base,   '#185FA5', 1, false);\n\n      // живая точка на конце базового\n      const ci = Math.min(Math.floor(visEnd), N-1);\n      const ex=qx(ci), ey=qy(base[ci]);\n      const gA = 0.18 + Math.sin(t*4)*0.14;\n      ctx.beginPath(); ctx.arc(ex,ey,5,0,Math.PI*2); ctx.fillStyle=`rgba(0,198,255,${gA})`; ctx.fill();\n      ctx.beginPath(); ctx.arc(ex,ey,2.5,0,Math.PI*2); ctx.fillStyle='#185FA5'; ctx.fill();\n\n      // метки кварталов\n      ctx.fillStyle='#9CA3AF'; ctx.font='5px \"JetBrains Mono\",monospace'; ctx.textAlign='center';\n      ['Q1','Q2','Q3','Q4','Q5','Q6'].forEach((q,i)=>ctx.fillText(q,qx(i),h-3));\n\n      // легенда\n      ctx.textAlign='left'; ctx.font='5.5px \"JetBrains Mono\",monospace';\n      ctx.fillStyle='rgba(24,95,165,0.65)'; ctx.fillRect(rL,rT,7,2.5); ctx.fillText('базовый',rL+9,rT+3);\n      ctx.fillStyle='rgba(218,58,28,0.65)'; ctx.fillRect(rL,rT+7,7,2.5); ctx.fillText('шок',rL+9,rT+10);\n      ctx.textAlign='left';\n    },\n    analytics: (ctx, w, h, t) => {\n      ctx.fillStyle='#0D1117'; ctx.fillRect(0,0,w,h);\n      const pL=20,pR=6,pT=7,pB=16,cW=w-pL-pR,cH=h-pT-pB,yMax=0.60,N=8;\n      // Y-axis grid at 15%, 30%, 45%\n      [1,2,3].forEach(i=>{const y=pT+cH*(1-i/4);ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;ctx.moveTo(pL,y);ctx.lineTo(pL+cW,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='5px \"JetBrains Mono\",monospace';ctx.textAlign='right';ctx.fillText(Math.round(i/4*yMax*100)+'%',pL-2,y+2);});\n      ctx.textAlign='left';\n      // 8 quarters with real market volatility\n      const sber=[0.39,0.43,0.38,0.44,0.40,0.44,0.42,0.45];\n      const vtb= [0.22,0.20,0.23,0.19,0.21,0.20,0.22,0.21];\n      const oth= [0.13,0.15,0.12,0.14,0.11,0.13,0.12,0.11];\n      const yx=v=>pT+cH*(1-v/yMax);\n      // Smooth bezier curve helpers\n      const drawCurveArea=(data,color,alpha)=>{\n        ctx.beginPath();ctx.moveTo(pL,pT+cH);ctx.lineTo(pL,yx(data[0]));\n        for(let i=1;i<N;i++){const x=pL+(i/(N-1))*cW,y=yx(data[i]),px=pL+((i-1)/(N-1))*cW,py=yx(data[i-1]),cp=(px+x)/2;ctx.bezierCurveTo(cp,py,cp,y,x,y);}\n        ctx.lineTo(pL+cW,pT+cH);ctx.closePath();ctx.fillStyle=color;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1;\n      };\n      const drawCurve=(data,color,lw)=>{\n        ctx.beginPath();ctx.moveTo(pL,yx(data[0]));\n        for(let i=1;i<N;i++){const x=pL+(i/(N-1))*cW,y=yx(data[i]),px=pL+((i-1)/(N-1))*cW,py=yx(data[i-1]),cp=(px+x)/2;ctx.bezierCurveTo(cp,py,cp,y,x,y);}\n        ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.stroke();\n      };\n      drawCurveArea(oth,'rgba(110,118,129,0.15)',1);\n      drawCurveArea(vtb,'rgba(55,138,221,0.10)',1);\n      drawCurveArea(sber,'rgba(0,114,255,0.20)',1);\n      drawCurve(oth,'rgba(255,255,255,0.18)',0.8);\n      drawCurve(vtb,'rgba(110,118,129,0.55)',1);\n      drawCurve(sber,'#378ADD',1.8);\n      // Missed auction event markers (red dashes)\n      ctx.setLineDash([2,2]);\n      [2,3,5].forEach(qi=>{const x=pL+(qi/(N-1))*cW;ctx.beginPath();ctx.moveTo(x,pT+2);ctx.lineTo(x,pT+cH);ctx.strokeStyle='rgba(239,68,68,0.22)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.arc(x,pT+3,1.8,0,Math.PI*2);ctx.fillStyle='rgba(239,68,68,0.72)';ctx.fill();ctx.setLineDash([2,2]);});\n      ctx.setLineDash([]);\n      // Animated scanning dot on Сбер line\n      const tp=(t*0.32)%1,fi=tp*(N-1),si=Math.min(Math.floor(fi),N-2),sf=fi-Math.floor(fi);\n      const av=sber[si]+(sber[si+1]-sber[si])*sf;\n      ctx.beginPath();ctx.arc(pL+tp*cW,yx(av),2.5,0,Math.PI*2);ctx.fillStyle='#00c6ff';ctx.fill();\n      // Labels\n      ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font='6px \"JetBrains Mono\",monospace';ctx.fillText('Сбер',pL+2,pT+7);\n      ctx.fillStyle='rgba(0,198,255,0.88)';ctx.font='bold 7px \"JetBrains Mono\",monospace';ctx.fillText('45%',w-22,h-4);\n      ctx.fillStyle='rgba(239,68,68,0.65)';ctx.font='5px \"JetBrains Mono\",monospace';ctx.fillText('884 miss',pL,h-3);\n    },\n    rag: (ctx, w, h, t) => {\n      ctx.fillStyle='#F8FAFC'; ctx.fillRect(0,0,w,h);\n      const nodes=[{l:'Query',x:w*.08,c:'#6E7681',bg:'#F0F2F5'},{l:'BM25',x:w*.27,c:'#854F0B',bg:'#FAEEDA'},{l:'pgvec',x:w*.27,c:'#3C3489',bg:'#EEEDFE'},{l:'RRF',x:w*.50,c:'#185FA5',bg:'#E6F1FB'},{l:'Rerank',x:w*.70,c:'#185FA5',bg:'#E6F1FB'},{l:'LLM',x:w*.88,c:'#3B6D11',bg:'#EAF3DE'}];\n      const ys=[h*.45,h*.22,h*.68,h*.45,h*.45,h*.45];\n      const edges=[[0,1],[0,2],[1,3],[2,3],[3,4],[4,5]];\n      edges.forEach(([f,to])=>{const a={x:nodes[f].x,y:ys[f]},b={x:nodes[to].x,y:ys[to]};ctx.beginPath();ctx.strokeStyle='#B5D4F4';ctx.lineWidth=1;ctx.moveTo(a.x+11,a.y);ctx.lineTo(b.x-11,b.y);ctx.stroke();});\n      const ei=Math.floor(t*1.3)%edges.length,ep=(t*1.3)%1;\n      const [ef,et2]=edges[ei];const ea={x:nodes[ef].x+11,y:ys[ef]},eb={x:nodes[et2].x-11,y:ys[et2]};\n      const px=ea.x+(eb.x-ea.x)*ep,py=ea.y+(eb.y-ea.y)*ep;\n      ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fillStyle='rgba(0,198,255,0.9)';ctx.fill();\n      nodes.forEach((n,i)=>{const r=11;ctx.beginPath();ctx.arc(n.x,ys[i],r,0,Math.PI*2);ctx.fillStyle=n.bg;ctx.fill();ctx.strokeStyle=n.c;ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=n.c;ctx.font='6px \"JetBrains Mono\",monospace';ctx.textAlign='center';ctx.fillText(n.l,n.x,ys[i]+3);});\n      ctx.textAlign='left';\n    },\n    'scaffold-workflow': (ctx, w, h, t) => {\n      ctx.clearRect(0, 0, w, h);\n\n      const steps = [\n        { l: 'Спецификация',  sub1: 'Задача описана', sub2: 'понятно всем',       badge: 'без кода',  x: w * 0.12, col: 'rgba(255,255,255,0.75)', bg: 'rgba(255,255,255,0.07)',  border: 'rgba(255,255,255,0.28)' },\n        { l: 'Код + Тесты',   sub1: 'Пишутся вместе', sub2: 'с первой строки',    badge: 'TDD',       x: w * 0.37, col: '#5AABF0',                bg: 'rgba(55,138,221,0.18)',   border: '#378ADD'                },\n        { l: 'Валидация',     sub1: 'ИИ проверяет',   sub2: 'каждый результат',   badge: 'авто',      x: w * 0.63, col: '#5AABF0',                bg: 'rgba(55,138,221,0.18)',   border: '#378ADD'                },\n        { l: 'Верификация',   sub1: '80% дешевле.',   sub2: 'Готово к деплою.',   badge: 'done ✓',    x: w * 0.88, col: '#7FC95A',                bg: 'rgba(95,168,50,0.18)',    border: '#5FA832'                },\n      ];\n\n      const nodeY = h * 0.34;\n      const r = Math.min(30, h * 0.19);\n\n      // Connecting lines + arrowheads\n      for (let i = 0; i < steps.length - 1; i++) {\n        const a = steps[i], b = steps[i + 1];\n        const sx = a.x + r + 5, ex = b.x - r - 5;\n        ctx.beginPath();\n        ctx.strokeStyle = 'rgba(55,138,221,0.22)';\n        ctx.lineWidth = 1.5;\n        ctx.setLineDash([4, 4]);\n        ctx.moveTo(sx, nodeY);\n        ctx.lineTo(ex, nodeY);\n        ctx.stroke();\n        ctx.setLineDash([]);\n        ctx.beginPath();\n        ctx.strokeStyle = 'rgba(55,138,221,0.45)';\n        ctx.lineWidth = 1.5;\n        ctx.moveTo(ex - 7, nodeY - 5);\n        ctx.lineTo(ex, nodeY);\n        ctx.lineTo(ex - 7, nodeY + 5);\n        ctx.stroke();\n      }\n\n      // Animated particle\n      const totalLen = steps[steps.length - 1].x - r - 5 - (steps[0].x + r + 5);\n      const ptRaw = ((t * 72) % (totalLen + 100)) - 20;\n      if (ptRaw >= 0) {\n        const ptX = steps[0].x + r + 5 + Math.min(ptRaw, totalLen);\n        const ptA = ptRaw > totalLen ? Math.max(0, 1 - (ptRaw - totalLen) / 40) : Math.min(1, ptRaw / 20);\n        if (ptA > 0.01) {\n          const grd = ctx.createRadialGradient(ptX, nodeY, 0, ptX, nodeY, 18);\n          grd.addColorStop(0, `rgba(0,198,255,${ptA * 0.35})`);\n          grd.addColorStop(1, 'rgba(0,198,255,0)');\n          ctx.beginPath(); ctx.arc(ptX, nodeY, 18, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();\n          ctx.beginPath(); ctx.arc(ptX, nodeY, 4.5, 0, Math.PI * 2); ctx.fillStyle = `rgba(0,198,255,${ptA})`; ctx.fill();\n        }\n      }\n\n      // Nodes\n      steps.forEach((s, i) => {\n        const pulse = 1 + Math.sin(t * 1.6 + i * 1.5) * 0.033;\n        const cr = r * pulse;\n\n        // Last-step glow\n        if (i === steps.length - 1) {\n          const og = ctx.createRadialGradient(s.x, nodeY, cr, s.x, nodeY, cr + 22);\n          og.addColorStop(0, 'rgba(95,168,50,0.22)');\n          og.addColorStop(1, 'rgba(95,168,50,0)');\n          ctx.beginPath(); ctx.arc(s.x, nodeY, cr + 22, 0, Math.PI * 2); ctx.fillStyle = og; ctx.fill();\n        }\n\n        ctx.beginPath(); ctx.arc(s.x, nodeY, cr, 0, Math.PI * 2); ctx.fillStyle = s.bg; ctx.fill();\n        ctx.strokeStyle = s.border; ctx.lineWidth = 1.5; ctx.stroke();\n\n        // Step number\n        ctx.fillStyle = s.col;\n        ctx.font = 'bold 14px \"JetBrains Mono\",monospace';\n        ctx.textAlign = 'center';\n        ctx.textBaseline = 'middle';\n        ctx.fillText(String(i + 1), s.x, nodeY);\n        ctx.textBaseline = 'alphabetic';\n\n        // Title\n        ctx.fillStyle = 'rgba(255,255,255,0.88)';\n        ctx.font = '11px \"Space Grotesk\",sans-serif';\n        ctx.fillText(s.l, s.x, nodeY + cr + 17);\n\n        // Two sub-lines\n        ctx.fillStyle = 'rgba(255,255,255,0.44)';\n        ctx.font = '9px \"Space Grotesk\",sans-serif';\n        ctx.fillText(s.sub1, s.x, nodeY + cr + 30);\n        ctx.fillText(s.sub2, s.x, nodeY + cr + 41);\n\n        // Badge\n        ctx.fillStyle = s.col;\n        ctx.font = '8px \"JetBrains Mono\",monospace';\n        ctx.fillText(s.badge, s.x, nodeY + cr + 56);\n      });\n\n      // Bottom label\n      ctx.fillStyle = 'rgba(0,198,255,0.28)';\n      ctx.font = '9px \"JetBrains Mono\",monospace';\n      ctx.textAlign = 'center';\n      ctx.fillText('s2tdd — spec-to-test-driven development', w / 2, h - 7);\n\n      ctx.textAlign = 'left';\n      ctx.textBaseline = 'alphabetic';\n    },\n  };\n\n  initScrollObservers() {\n    const sectionModes = { hero:'hero', techcon:'grid', scaffold:'workflow', sber:'free', contact:'converge' };\n    const sectionObs = new IntersectionObserver(entries => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          const mode = sectionModes[e.target.dataset.section];\n          if (mode) { this.networkModeRef = mode; this.setState({ networkMode: mode }); }\n        }\n      });\n    }, { threshold: 0.25 });\n    document.querySelectorAll('[data-section]').forEach(el => sectionObs.observe(el));\n    const fadeObs = new IntersectionObserver(entries => {\n      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); fadeObs.unobserve(e.target); } });\n    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\n    document.querySelectorAll('.fade-up').forEach(el => fadeObs.observe(el));\n  }\n\n  openProject(id) {\n    this.setState({ activeProjectId: id, drawerOpen: true });\n    document.body.style.overflow = 'hidden';\n  }\n\n  closeDrawer() {\n    this.setState({ drawerOpen: false });\n    setTimeout(() => this.setState({ activeProjectId: null }), 360);\n    document.body.style.overflow = '';\n  }\n\n  renderVals() {\n    const { activeProjectId, drawerOpen } = this.state;\n    const proj = activeProjectId ? this.projectsData[activeProjectId] : null;\n    return {\n      bgRef: this.bgRef,\n      drawerHasContent: !!proj,\n      projTitle: proj?.title ?? '',\n      projTag: proj?.tag ?? '',\n      projFullDesc: proj?.fullDesc ?? '',\n      projArch: proj?.architecture ?? '',\n      projMetrics: proj?.metrics ?? [],\n      projStack: proj?.stack ?? [],\n      projDifficulty: proj?.difficulty ?? '',\n      drawerOverlayStyle: { position:'fixed', inset:0, zIndex:200, background:'rgba(0,0,0,0.35)', opacity:drawerOpen?1:0, pointerEvents:drawerOpen?'auto':'none', transition:'opacity 0.3s ease' },\n      drawerPanelStyle: { position:'absolute', top:0, right:0, width:'480px', maxWidth:'96vw', height:'100%', background:'#fff', transform:drawerOpen?'translateX(0)':'translateX(100%)', transition:'transform 0.36s cubic-bezier(0.25,0.46,0.45,0.94)', boxShadow:'-8px 0 40px rgba(0,0,0,0.14)', display:'flex', flexDirection:'column' },\n      closeDrawer: () => this.closeDrawer(),\n      stopProp: (e) => e.stopPropagation(),\n      openDefectoscopy: () => this.openProject('defectoscopy'),\n      openDocuments: () => this.openProject('documents'),\n      openSTT: () => this.openProject('stt'),\n      openInfra: () => this.openProject('infra'),\n      openFKRBot: () => this.openProject('fkr-bot'),\n      openAssistant: () => this.openProject('assistant'),\n      openNegotiations: () => this.openProject('negotiations'),\n      openBudgets: () => this.openProject('budgets'),\n      openAnalytics: () => this.openProject('analytics'),\n      openRAG: () => this.openProject('rag'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
